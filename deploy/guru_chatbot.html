<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guru AI Chat — Silicon Siddhanta</title>
<meta name="description" content="4-in-1 Vedic Guru AI Chatbot with real conversational intelligence. Brajesh Gautam, Sadhguru, Sri Sri, Siddha Sage.">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0b1120;--bg2:#131b2e;--bg3:#1a2340;--text:#eef2f7;--text2:#8b9cc0;--text3:#5a6b8a;--accent:#e5a100;--indigo:#6366f1;--cyan:#0ea5e9;--green:#22c55e;--border:#1e2a42;--radius:14px;--font:'Inter',system-ui,sans-serif}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;background:linear-gradient(160deg,var(--bg) 0%,var(--bg2) 40%,var(--bg) 100%)}

.landing{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 24px}
.landing h1{font-size:clamp(2.2rem,5vw,3.5rem);font-weight:800;background:linear-gradient(135deg,var(--accent),var(--indigo),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:12px}
.landing .sub{font-size:15px;color:var(--accent);font-weight:500;margin-bottom:8px;letter-spacing:1px}
.landing p{font-size:17px;color:var(--text2);max-width:620px;line-height:1.7;margin-bottom:32px}
.guru-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:14px;max-width:1060px;width:100%;margin-bottom:36px}
.guru-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:22px;cursor:pointer;transition:all .3s ease;text-align:left;position:relative;overflow:hidden}
.guru-card:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,0.3)}
.guru-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;opacity:0;transition:opacity .3s}
.guru-card:hover::before{opacity:1}
.guru-card .top{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.guru-card .emoji-wrap{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.guru-card h3{font-size:17px;font-weight:700}
.guru-card .title{font-size:11px;margin-top:2px}
.guru-card .tagline{font-size:12.5px;color:var(--text3);line-height:1.55;margin-bottom:10px}
.guru-card .topics-row{display:flex;flex-wrap:wrap;gap:4px}
.guru-card .topic-chip{font-size:10px;padding:3px 8px;border-radius:10px;white-space:nowrap}

/* Chat */
.chat-overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.55);backdrop-filter:blur(5px);align-items:center;justify-content:center;padding:16px}
.chat-overlay.open{display:flex}
.chat-panel{width:100%;max-width:480px;height:min(720px,92vh);background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,0.6)}
.chat-hdr{padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.chat-hdr .av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;cursor:pointer;transition:transform .2s}
.chat-hdr .av:hover{transform:scale(1.1)}
.chat-hdr .info{flex:1}
.chat-hdr .info h3{font-size:14px;font-weight:600}
.chat-hdr .info .status{font-size:10px;display:flex;align-items:center;gap:4px}
.chat-hdr .info .status .dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.chat-hdr .btns{display:flex;gap:6px}
.chat-hdr .btns button{background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text2);cursor:pointer;padding:4px 10px;font-size:10px;font-family:var(--font);transition:all .2s}
.chat-hdr .btns button:hover{border-color:var(--accent);color:var(--text)}
.chat-hdr .close{background:none;border:none;color:var(--text3);font-size:22px;cursor:pointer;padding:0 4px;transition:color .2s}
.chat-hdr .close:hover{color:var(--text)}

/* Context banner */
.ctx-banner{padding:8px 16px;background:var(--bg3);border-bottom:1px solid var(--border);font-size:10px;color:var(--text3);display:flex;align-items:center;gap:6px}
.ctx-banner .ctx-tag{padding:2px 7px;border-radius:8px;font-size:9px;font-weight:600}

.msgs{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.msgs::-webkit-scrollbar{width:4px}
.msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.msg{display:flex;max-width:88%}
.msg.user{align-self:flex-end}
.msg.guru{align-self:flex-start}
.msg .bbl{padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.65;white-space:pre-wrap;word-break:break-word}
.msg.guru .bbl{background:var(--bg3);border:1px solid var(--border)}
.msg .bbl .bold{font-weight:600}
.msg .bbl .dim{opacity:0.5;font-size:11px}
.msg .bbl .quote-block{border-left:3px solid;padding-left:10px;margin:8px 0;font-style:italic;opacity:0.85}
.msg .bbl .action-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
.msg .bbl .action-chip{padding:4px 10px;border-radius:12px;font-size:11px;cursor:pointer;transition:all .2s;border:1px solid}
.msg .bbl .action-chip:hover{filter:brightness(1.3)}
.msg .time{font-size:8px;color:var(--text3);margin-top:3px;text-align:right}
.typing-wrap{align-self:flex-start;display:flex;align-items:center;gap:8px}
.typing-dots{display:flex;gap:4px;padding:10px 16px;border-radius:14px;background:var(--bg3);border:1px solid var(--border)}
.typing-dots span{width:6px;height:6px;border-radius:50%;animation:blink 1.4s infinite both}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}

.quick-row{padding:8px 16px;display:flex;flex-wrap:wrap;gap:5px;border-top:1px solid var(--border)}
.quick-row .qchip{padding:5px 11px;border-radius:14px;cursor:pointer;font-size:11px;transition:all .2s;border:1px solid}
.quick-row .qchip:hover{filter:brightness(1.4)}

.input-bar{padding:10px 12px;background:var(--bg2);border-top:1px solid var(--border);display:flex;gap:8px;align-items:center}
.input-bar input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-size:13px;font-family:var(--font);outline:none;transition:border-color .2s}
.input-bar input:focus{border-color:var(--accent)}
.input-bar input::placeholder{color:var(--text3)}
.input-bar .send{width:40px;height:40px;border-radius:10px;border:none;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;transition:all .2s;font-weight:700}
.input-bar .send:disabled{opacity:0.3;cursor:default}

.float-orb{position:fixed;bottom:24px;right:24px;z-index:90;cursor:pointer;text-align:center}
.float-orb .orb{width:58px;height:58px;border-radius:50%;background:radial-gradient(circle at 35% 35%,var(--accent),var(--indigo));display:flex;align-items:center;justify-content:center;font-size:25px;border:2px solid rgba(229,161,0,0.25);box-shadow:0 0 20px rgba(229,161,0,0.3),0 4px 16px rgba(0,0,0,0.4);animation:orbP 3s ease-in-out infinite;transition:transform .2s}
.float-orb .orb:hover{transform:scale(1.12)}
.float-orb .lbl{font-size:9px;color:var(--text3);margin-top:4px;letter-spacing:.5px}
@keyframes orbP{0%,100%{transform:scale(1);box-shadow:0 0 12px rgba(229,161,0,0.3)}50%{transform:scale(1.12);box-shadow:0 0 24px rgba(229,161,0,0.5)}}

@media(max-width:600px){
  .guru-grid{grid-template-columns:1fr;gap:10px}
  .chat-panel{height:100%;max-height:100vh;border-radius:0}
  .chat-overlay{padding:0}
}
</style>
</head>

// ═══════════════════════════════════════════════════════════════════════════
// AI ENGINE — Intent Detection + Entity Extraction + Context-Aware Response
// ═══════════════════════════════════════════════════════════════════════════

const conversationState = {
  guru: null,
  history: [],
  entities: {},        // accumulated entities across conversation
  lastIntent: null,
  lastTopic: null,
  turnCount: 0,
  mood: "neutral",     // neutral, seeking, distressed, curious, challenging
  mentionedPlanets: new Set(),
  mentionedTopics: new Set(),
  askedAboutChart: false,
  deepDiveCount: 0,
};

function detectIntent(msg) {
  const lower = msg.toLowerCase().trim();
  let best = { intent: "LEARN", score: 0 };

  for (const rule of INTENT_RULES) {
    for (const pat of rule.patterns) {
      if (pat.test(lower)) {
        const score = INTENTS[rule.intent].weight;
        if (score > best.score || (score === best.score && rule.intent !== "LEARN")) {
          best = { intent: rule.intent, score };
        }
      }
    }
  }

  // Context boost — if user has been in COMFORT mood, stay there
  if (conversationState.mood === "distressed" && best.intent === "LEARN") {
    best.intent = "COMFORT";
  }

  return best.intent;
}

function extractEntities(msg) {
  const lower = msg.toLowerCase();
  const found = {};

  for (const [cat, {patterns, type}] of Object.entries(ENTITY_PATTERNS)) {
    const matches = [];
    for (const p of patterns) {
      if (lower.includes(p)) matches.push(p);
    }
    if (matches.length > 0) found[type] = matches;
  }

  return found;
}

function findGraphNodes(guruId, msg, entities) {
  const guru = GURUS[guruId];
  const lower = msg.toLowerCase();
  const results = [];

  function scoreText(text) {
    if (!text) return 0;
    const tl = (typeof text === "string" ? text : JSON.stringify(text)).toLowerCase();
    let score = 0;
    const words = lower.split(/\s+/).filter(w => w.length > 2);
    words.forEach(w => { if (tl.includes(w)) score += 1; });
    // Entity bonus
    Object.values(entities).flat().forEach(e => { if (tl.includes(e)) score += 3; });
    return score;
  }

  // Deep search through graph
  function walkGraph(obj, path, depth) {
    if (depth > 4) return;
    if (typeof obj === "string") {
      const s = scoreText(obj);
      if (s > 0) results.push({ path, text: obj, score: s, depth });
    } else if (Array.isArray(obj)) {
      obj.forEach((item, i) => walkGraph(item, path + `[${i}]`, depth + 1));
    } else if (obj && typeof obj === "object") {
      for (const [k, v] of Object.entries(obj)) {
        if (k === "label" || k === "icon" || k === "id" || k === "color" || k === "emoji") continue;
        walkGraph(v, path ? `${path}.${k}` : k, depth + 1);
      }
    }
  }

  walkGraph(guru.graph, "", 0);
  results.sort((a, b) => b.score - a.score);
  return results;
}

// ─── RESPONSE COMPOSER ───
function composeResponse(guruId, message) {
  const guru = GURUS[guruId];
  const state = conversationState;
  state.turnCount++;

  const intent = detectIntent(message);
  const entities = extractEntities(message);
  state.lastIntent = intent;

  // Track entities
  if (entities.planet) entities.planet.forEach(p => state.mentionedPlanets.add(p));
  Object.entries(entities).forEach(([k, v]) => state.mentionedTopics.add(k));
  if (entities.emotion) state.mood = "distressed";
  if (intent === "DEBATE") state.mood = "challenging";
  if (intent === "PERSONAL") state.askedAboutChart = true;

  // ─── GREETING ───
  if (intent === "GREETING") {
    const q = pickRandom(guru.quotes);
    const topics = Object.values(guru.graph).map(n => `${n.icon||"📌"} ${n.label||""}`).filter(Boolean).slice(0, 5).join("\n");
    return `${guru.greeting}! 🙏\n\nI am ${guru.name} — ${guru.title}.\n\n${guru.tagline}\n\nI can guide you on:\n${topics}\n\nAsk me anything — or tell me what's on your mind.\n\n✨ _"${q}"_`;
  }

  // ─── META ───
  if (intent === "META") {

  // ─── REMEDY ───

  }

  // ─── STORY ───
  if (intent === "STORY") {
    return buildStoryResponse(guruId, message, entities, topNodes);
  }

  // ─── LEARN (default) ───
  return buildLearnResponse(guruId, message, entities, topNodes);
}

// ─── HELPER FUNCTIONS ───

function pickRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function findTopicLabel(gid, path) {
  if (!path) return "";
  const g = GURUS[gid];
  const first = path.split(".")[0];
  return g.graph[first]?.label || "";
}

function guru_general_wisdom(gid, msg) {
  const g = GURUS[gid];
  return g.quotes.map(q => `I'd say: "${q}"\n\nBut let me go deeper — ask me something specific about ${Object.values(g.graph).map(n=>n.label).filter(Boolean).slice(0,3).join(", or ")} and I'll give you real depth.`);
}

function generateFollowUp(gid, ent, nodes) {
  const state = conversationState;
  const g = GURUS[gid];
  const topics = Object.values(g.graph).map(n => n.label).filter(Boolean);
  const unvisited = topics.filter(t => !state.mentionedTopics.has(t.toLowerCase()));

  if (state.turnCount === 1) return `_Want to go deeper? Ask me about ${unvisited.slice(0, 2).join(" or ")}._`;
  if (state.turnCount > 3 && !state.askedAboutChart && gid === "brajesh") return `_I can also read your chart personally — just ask! 🔮_`;
  if (state.turnCount > 2) return `_Ask me for a story, a practice, or challenge me — I can handle it._`;
  return "";
}

  const grid = document.getElementById("guruGrid");
  grid.innerHTML = Object.values(GURUS).map(g => {
    const topics = Object.values(g.graph).map(n => `<span class="topic-chip" style="background:${g.color}12;color:${g.color};border:1px solid ${g.color}22">${n.icon||"📌"} ${n.label||""}</span>`).filter(Boolean).slice(0,5).join("");
    return `<div class="guru-card" onclick="openChat('${g.id}')" style="--gc:${g.color}">
      <style>.guru-card[style*="${g.color}"]::before{background:${g.color}}</style>
      <div class="top">
        <div class="emoji-wrap" style="background:${g.color}18;border:2px solid ${g.color}44">${g.emoji}</div>
        <div><h3 style="color:${g.color}">${g.name}</h3><div class="title" style="color:${g.color}88">${g.title}</div></div>
      </div>
      <div class="tagline">${g.tagline}</div>
      <div class="topics-row">${topics}</div>
    </div>`;
  }).join("");
}

function openChat(gid) {
  // Reset conversation state
  Object.assign(conversationState, {
    guru: gid, history: [], entities: {}, lastIntent: null, lastTopic: null,
    turnCount: 0, mood: "neutral", mentionedPlanets: new Set(),
    mentionedTopics: new Set(), askedAboutChart: false, deepDiveCount: 0
  });

  const g = GURUS[gid];

  // Header
  document.getElementById("chatHdr").innerHTML = `
    <div class="av" style="background:${g.color}18;border:2px solid ${g.color}55" onclick="closeChat()" title="Back to guru list">${g.emoji}</div>
    <div class="info"><h3>${g.name}</h3><div class="status"><span class="dot" style="background:${g.color}"></span><span style="color:${g.color}">AI Active</span></div></div>
    <div class="btns"><button onclick="openChat('${gid}')">🔄 New</button><button onclick="closeChat()">Switch</button></div>
    <button class="close" onclick="closeChat()">×</button>`;

  // Styling
  document.getElementById("sendBtn").style.background = g.color;
  document.getElementById("sendBtn").style.color = "#fff";
  document.getElementById("chatInput").placeholder = `Ask ${g.name}...`;

  // Context banner
  const ctx = document.getElementById("ctxBanner");
  ctx.style.display = "flex";
  ctx.innerHTML = `<span class="ctx-tag" style="background:${g.color}22;color:${g.color}">AI</span> Understands intent · Remembers context · Responds in character`;

  // Quick topics
  const qt = document.getElementById("quickRow");
  const quickTopics = [
    ...Object.values(g.graph).slice(0, 3).map(n => ({ label: n.label, icon: n.icon })),
    { label: "Tell me a story", icon: "📖" },
    { label: "Personal advice", icon: "💫" }
  ];
  qt.innerHTML = quickTopics.map(t =>
    `<div class="qchip" style="background:${g.color}12;border-color:${g.color}33;color:${g.color}" onclick="quickSend('${t.label}')">${t.icon} ${t.label}</div>`
  ).join("");
  qt.style.display = "flex";

  // Clear & greeting
  document.getElementById("msgs").innerHTML = "";
  const greeting = composeResponse(gid, "hello");
  addMsg("guru", greeting, g);

  document.getElementById("chatOverlay").classList.add("open");
  setTimeout(() => document.getElementById("chatInput").focus(), 200);
}

function closeChat() {
  document.getElementById("chatOverlay").classList.remove("open");
}

function addMsg(role, text, guru) {
  const el = document.getElementById("msgs");
  const c = guru?.color || "#e5a100";
  const time = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });

  // Parse markdown-lite: **bold**, _italic_, numbered lists
  let html = text
    .replace(/\*\*([^*]+)\*\*/g, `<span class="bold" style="color:${c}">$1</span>`)
    .replace(/_([^_]+)_/g, `<em style="opacity:0.8">$1</em>`)
    .split("\n").map(line => {
      if (line.trim() === "") return '<div style="height:8px"></div>';
      return `<div style="margin-bottom:2px">${line}</div>`;
    }).join("");

  const div = document.createElement("div");
  div.className = `msg ${role}`;
  div.innerHTML = `<div class="bbl" style="${role === 'user' ? `background:${c}14;border:1px solid ${c}28` : ''}">${html}<div class="time">${time}</div></div>`;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;

  // Hide quick topics after a few messages
  if (conversationState.turnCount > 2) {
    document.getElementById("quickRow").style.display = "none";
  }
}

function showTyping(guru) {
  const el = document.getElementById("msgs");
  const c = guru?.color || "#e5a100";
  const div = document.createElement("div");
  div.className = "typing-wrap";
  div.id = "typingEl";
  div.innerHTML = `<div class="typing-dots"><span style="background:${c}"></span><span style="background:${c}"></span><span style="background:${c}"></span></div>`;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById("typingEl");
  if (el) el.remove();
}

function handleSend() {
  const input = document.getElementById("chatInput");
  const text = input.value.trim();
  if (!text || !conversationState.guru) return;

  const g = GURUS[conversationState.guru];
  addMsg("user", text, g);
  input.value = "";
  document.getElementById("sendBtn").disabled = true;

  // Save to history
  conversationState.history.push({ role: "user", text });

  showTyping(g);

  // Variable delay based on response complexity
  const delay = 400 + Math.random() * 600 + (text.length > 50 ? 300 : 0);

  setTimeout(() => {
    removeTyping();
    const response = composeResponse(conversationState.guru, text);
    addMsg("guru", response, g);
    conversationState.history.push({ role: "guru", text: response });
    document.getElementById("sendBtn").disabled = false;
  }, delay);
}

function quickSend(text) {
  document.getElementById("chatInput").value = text;
  handleSend();
}

function scrollToGrid() {
  document.getElementById("landing").scrollIntoView({ behavior: "smooth" });
}

// ─── Input handling ───
const chatInput = document.getElementById("chatInput");
const sendBtn = document.getElementById("sendBtn");
chatInput.addEventListener("input", () => { sendBtn.disabled = !chatInput.value.trim(); });
chatInput.addEventListener("keydown", e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); handleSend(); } });

// ─── Overlay close ───
document.getElementById("chatOverlay").addEventListener("click", e => { if (e.target.id === "chatOverlay") closeChat(); });

// ─── Init ───
renderGrid();
</script>
</body>
